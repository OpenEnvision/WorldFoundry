name: worldfoundry
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel
  - packaging
  - git
  - git-lfs
  - ffmpeg
  - libexpat
  - cmake
  - ninja
  # Native ViPE/DROID kernels require Eigen headers at build time.
  - eigen=3.4
  - pkg-config
  - libgl
  - libglib
