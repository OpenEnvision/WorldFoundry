id: worldreasonbench
name: WorldReasonBench
benchmark_kind:
- image-to-video
- world-reasoning
- reward-model-evaluation
domains:
- world-knowledge
- human-centric
- logic-reasoning
- information-based-reasoning
modalities:
- image
- video
- text
status: confirmed_official_code_and_data_in_github
official_sources:
  github:
    url: https://github.com/UniX-AI-Lab/WorldReasonBench
    revision: 4dbc6ab91f8eac7db597a3db2824469f96c9a033
  huggingface_datasets:
  - repo_id: WorldReasonBench
    url: https://huggingface.co/datasets/WorldReasonBench
    download_endpoint: https://hf-mirror.com
  paper_url: https://arxiv.org/abs/2605.10434
  project_page: https://unix-ai-lab.github.io/WorldReasonBench/
  license:
    status: restricted_noncommercial
    notes: The upstream repository has no LICENSE file at the pinned revision. Its README prohibits redistribution,
      modification, and commercial use without prior approval despite also referring to MIT.
benchmark_assets:
  official_data:
    status: external_restricted_asset
    root_env: WORLDFOUNDRY_WORLDREASONBENCH_ROOT
    expected_cases: 436
    reward_pairs: 5969
  in_tree_fixture:
    path: worldfoundry/data/benchmarks/assets/worldreasonbench
    purpose: Synthetic protocol validation only; contains no upstream benchmark records or prompts.
evaluation_surface:
  tracks:
  - qa_process_reasoning
  - pointwise_reward
  - pairwise_reward
  requires_openai_compatible_judge: true
metrics:
- id: score_pr
  name: Process-aware Reasoning Score
  description: Geometric combination of QA accuracy and dynamic reasoning score.
  higher_is_better: true
  leaderboard_key: score_pr
  aggregator: geometric
  output_unit: score
  primary: true
- id: qa_accuracy
  name: QA Accuracy
  higher_is_better: true
  leaderboard_key: qa_accuracy
  aggregator: mean
  output_unit: accuracy
- id: state_score
  name: State Score
  higher_is_better: true
  leaderboard_key: state_score
  aggregator: mean
  output_unit: score
- id: process_score
  name: Process Score
  higher_is_better: true
  leaderboard_key: process_score
  aggregator: mean
  output_unit: score
- id: fidelity_score
  name: Fidelity Score
  higher_is_better: true
  leaderboard_key: fidelity_score
  aggregator: mean
  output_unit: score
- id: mechanism_score
  name: Mechanism Score
  higher_is_better: true
  leaderboard_key: mechanism_score
  aggregator: mean
  output_unit: score
- id: static_outcome_score
  name: Static Outcome Score
  higher_is_better: true
  leaderboard_key: static_outcome_score
  aggregator: mean
  output_unit: score
- id: dynamic_reasoning_score
  name: Dynamic Reasoning Score
  higher_is_better: true
  leaderboard_key: dynamic_reasoning_score
  aggregator: mean
  output_unit: score
- id: reasoning_gap
  name: Reasoning Gap
  description: Static outcome score minus dynamic reasoning score; lower values indicate less outcome hacking.
  higher_is_better: false
  leaderboard_key: reasoning_gap
  aggregator: mean
  output_unit: score
- id: pointwise_score
  name: Pointwise S(v)
  higher_is_better: true
  leaderboard_key: pointwise_score
  aggregator: weighted_mean
  output_unit: score
- id: reasoning_correctness
  name: Reasoning Correctness
  higher_is_better: true
  leaderboard_key: reasoning_correctness
  aggregator: mean
  output_unit: score
- id: content_fidelity
  name: Content Fidelity
  higher_is_better: true
  leaderboard_key: content_fidelity
  aggregator: mean
  output_unit: score
- id: visual_aesthetics
  name: Visual Aesthetics
  higher_is_better: true
  leaderboard_key: visual_aesthetics
  aggregator: mean
  output_unit: score
- id: pointwise_spearman
  name: Pointwise Spearman Correlation
  higher_is_better: true
  leaderboard_key: pointwise_spearman
  aggregator: correlation
  output_unit: correlation
- id: induced_pairwise_accuracy
  name: Induced Pairwise Accuracy
  higher_is_better: true
  leaderboard_key: induced_pairwise_accuracy
  aggregator: mean
  output_unit: accuracy
- id: pairwise_accuracy_with_ties
  name: Pairwise Accuracy With Ties
  higher_is_better: true
  leaderboard_key: pairwise_accuracy_with_ties
  aggregator: mean
  output_unit: accuracy
- id: pairwise_accuracy_without_ties
  name: Pairwise Accuracy Without Ties
  higher_is_better: true
  leaderboard_key: pairwise_accuracy_without_ties
  aggregator: mean
  output_unit: accuracy
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldReasonBenchContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - worldreasonbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results_dir>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_protocol_runtime_external_assets
    root: worldfoundry/evaluation/tasks/execution/runners/worldreasonbench
    root_env: WORLDFOUNDRY_WORLDREASONBENCH_ROOT
    results_path_env: WORLDFOUNDRY_WORLDREASONBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - raw_metric_table.jsonl
  - protocol_results.json
  - benchmark_contract.json
  verification_status: normalizer_only
integration:
  status: integrated
  blocked_reasons:
  - Real judge execution requires an OpenAI-compatible multimodal endpoint and official restricted assets.
  - Upstream redistribution restrictions prevent vendoring its data, templates, and evaluator source without approval.
release_status: experimental
maturity: verified_runner
open_source_status: in_tree_result_normalizer
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
requires:
- WORLDFOUNDRY_WORLDREASONBENCH_ROOT for official execution
- OPENAI_BASE_URL and a compatible multimodal judge
blockers:
- Full official QA, pointwise, and pairwise judge runs have not yet been executed through this integration.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldreasonbench.yaml
  fixture: worldfoundry/data/benchmarks/assets/worldreasonbench
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldReasonBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: false
  surface: worldreasonbench_official_in_tree
  normalizer_verified: true
optional_base_model_dependencies:
- openai_compatible_multimodal_judge
validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id worldreasonbench --mode official-validation
  --official-results-path <official_results_dir> --output-dir <out> --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
