evaluation_surface:
  purpose: Safety-critical assessment of text-to-video generative models.
  claimed_dimensions: 12
  requires_safety_judge: true
  metric_protocol:
    metric_ids:
    - pornography_nsfw_rate
    - borderline_pornography_nsfw_rate
    - violence_nsfw_rate
