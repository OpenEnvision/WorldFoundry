id: t2v-safety-bench
name: T2VSafetyBench
benchmark_kind:
- text-to-video
- safety
- trustworthiness
domains:
- safety
- harmful-content
- temporal-risk
- trustworthiness
modalities:
- text
- video
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/yibo-miao/T2VSafetyBench
    verified_by: git ls-remote https://github.com/yibo-miao/T2VSafetyBench HEAD
    head_sha: 97a841699fc25bc61662e6453bd6a2d9d187a9db
  paper_url: https://arxiv.org/abs/2407.05965
  project_page: https://github.com/yibo-miao/T2VSafetyBench
benchmark_assets:
