runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VSafetyBenchContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - t2v-safety-bench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
    repo_url: https://github.com/yibo-miao/T2VSafetyBench.git
    repo_revision: 97a841699fc25bc61662e6453bd6a2d9d187a9db
    root_env: WORLDFOUNDRY_T2V_SAFETY_BENCH_ROOT
    results_path_env: WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: pending
  notes:
  - WorldFoundry supports both official-result import and strict prompt-to-video staging into the checked-in GPT judge.
  - Command construction, staging, failure semantics, and normalization are tested without treating a mocked API as metric evidence.
  - Real judge execution and leaderboard parity remain pending user-supplied API/model access and complete generated artifacts.
  required_env: []
integration:
  status: integrated
  blocked_reasons:
  - Real judge execution was not run during release validation because it requires user credentials.
  - Full validation requires every generated video in all official prompt classes.
  - Leaderboard parity requires the same judge model and protocol used by the benchmark authors.
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
requires:
- 'import mode: WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH or official_results_path'
- 'judge mode: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR plus OPENAI_API_KEY or WORLDFOUNDRY_T2V_SAFETY_BENCH_GPT_API_KEY'
- configured GPT/manual judge assets for leaderboard parity
blockers:
- Real judge execution was not run during release validation because it requires user credentials.
- Full validation requires every generated video in all official prompt classes.
- Leaderboard parity requires the same judge model and protocol used by the benchmark authors.
