id: phygenbench
name: PhyGenBench
benchmark_kind:
- text-to-video
- physical-commonsense
- world-simulator
domains:
- physics
- physical-commonsense
- physical-law-adherence
modalities:
- text
- video
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/OpenGVLab/PhyGenBench
    verified_by: git ls-remote https://github.com/OpenGVLab/PhyGenBench HEAD
    head_sha: f8642cb796f3bcb01f0b7c1b2ec53b75d357c739
  paper_url: https://arxiv.org/abs/2410.05363
  project_page: https://phygenbench123.github.io/
benchmark_assets:
  prompt_suite:
    status: official_repo_data
    path_or_ref: PhyGenBench
evaluation_surface:
  purpose: Physical commonsense benchmark for video generation.
  claimed_prompts: 160
  claimed_physical_laws: 27
  requires_judge_runtime: true
metrics:
- id: physical_commonsense
  name: Physical Commonsense
  description: Physical Commonsense normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physical_commonsense
  aggregator: mean
  output_unit: score
- id: physical_law_adherence
  name: Physical Law Adherence
  description: Physical Law Adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physical_law_adherence
  aggregator: mean
  output_unit: score
- id: semantic_adherence
  name: Semantic Adherence
  description: Semantic Adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: semantic_adherence
  aggregator: mean
  output_unit: score
- id: phygenbench_average
  name: PhyGenBench Average
  description: PhyGenBench Average normalized benchmark score.
  higher_is_better: true
  leaderboard_key: phygenbench_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGenBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - phygenbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_result_importer_and_bounded_overall_aggregator
    root: worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench
    repo_url: https://github.com/OpenGVLab/PhyGenBench.git
    repo_revision: f8642cb796f3bcb01f0b7c1b2ec53b75d357c739
    root_env: WORLDFOUNDRY_PHYGENBENCH_ROOT
    root_env_required: false
    results_path_env: WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: bounded_component_ready
  notes:
  - The in-tree official backend runs only PhyGenEval overall.py over already-prepared stage outputs.
  - It does not execute the VQAScore, GPT-4o/LLaVA, or InternVideo2 stage judges.
  - The mock backend is wiring-only and is never benchmark evidence.
  - WorldFoundry normalizes caller-provided official result files through the dedicated runner.
  required_env: []
  optional_env:
  - WORLDFOUNDRY_PHYGENBENCH_ROOT
  - WORLDFOUNDRY_PHYGENBENCH_PROMPT_MANIFEST
  - WORLDFOUNDRY_PHYGENBENCH_JUDGE_BACKEND
  - WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
  - WORLDFOUNDRY_PHYGENBENCH_MODEL_NAME
  - WORLDFOUNDRY_PHYGENBENCH_STRICT
integration:
  status: integrated
  blocked_reasons:
  - Only result import and the bounded overall aggregation component are available; stage judge execution is absent.
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_result_importer_and_bounded_aggregator
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
requires:
- An official result file for import, or fully prepared PhyGenEval stage outputs for bounded overall aggregation
- In-tree prompts/overall.py or an optional WORLDFOUNDRY_PHYGENBENCH_ROOT override
blockers:
- WorldFoundry does not run the PhyGenEval stage judges, so overall aggregation alone is not official benchmark evidence.
- Mock output is deterministic wiring data and must not be reported as benchmark evidence.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phygenbench.yaml
  in_tree_runtime_paths:
  - worldfoundry/data/benchmarks/assets/phygenbench/PhyGenBench/prompts.json
  - worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench/PhyGenEval/overall.py
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGenBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: false
  surface: in_tree_result_importer_and_bounded_overall_aggregator
  normalizer_verified: true
dataset:
  not_applicable: true
  reason: Prompt assets are bundled; result import and prepared-stage aggregation do not require a Hugging Face dataset.
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phygenbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
