id: physics-iq
name: Physics-IQ Original
benchmark_kind: [image-to-video, physical-understanding, video-generation-quality]
domains: [physics, solid-mechanics, fluid-dynamics, optics, thermodynamics, magnetism]
modalities: [image, video]
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/google-deepmind/physics-IQ-benchmark
    head_sha: b02cf26dc15d559d0ca4f63a6917070312dde185
  paper_url: https://arxiv.org/abs/2501.09038
  project_page: https://physics-iq.github.io/
benchmark_assets:
  prompt_suite:
    status: bundled_in_tree
    path: worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions_original.csv
  dataset:
    status: external_official_media
    directory_name: physics-IQ-benchmark
evaluation_surface:
  purpose: Original Physics-IQ physical-understanding protocol.
  raw_metrics: [spatial_iou, weighted_spatial_iou, spatiotemporal_iou, mse]
  score_protocol: original_global_aggregation
metrics:
- id: physics_iq_score
  name: Physics-IQ Score
  description: Original global-aggregation score (official final_score_orig).
  higher_is_better: true
  leaderboard_key: physics_iq_score
  aggregator: mean
  output_unit: rate
  primary: true
- id: physics_iq_stable_score
  name: Physics-IQ Stable Score
  description: Component-clipped stable score emitted by the current official implementation.
  higher_is_better: true
  leaderboard_key: physics_iq_stable_score
  aggregator: mean
  output_unit: rate
- id: physics_iq_spatiotemporal
  name: Spatiotemporal IoU Ratio
  higher_is_better: true
  aggregator: mean
- id: physics_iq_spatial
  name: Spatial IoU Ratio
  higher_is_better: true
  aggregator: mean
- id: physics_iq_weighted_spatial
  name: Weighted Spatial IoU Ratio
  higher_is_better: true
  aggregator: mean
- id: physics_iq_mse_penalty
  name: MSE Penalty
  higher_is_better: false
  aggregator: mean
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysicsIQContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
  run_command: >-
    PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
    --benchmark-id physics-iq --protocol original --run-official
    --dataset-root "${WORLDFOUNDRY_PHYSICS_IQ_ORIGINAL_ROOT}"
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}"
    --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  runtime:
    kind: in_tree_official_runtime
    upstream_revision: b02cf26dc15d559d0ca4f63a6917070312dde185
    root: worldfoundry/evaluation/tasks/execution/runners/physics_iq
    source_checkout_required: false
    bundled_descriptions: worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions_original.csv
  expected_artifacts: [scorecard.json, benchmark_contract.json, raw_metrics.csv, official_metrics.json, results_summary.csv, raw_metric_table.jsonl, per_sample_scores.jsonl]
  verification_status: in_tree_raw_video_evaluator
  required_env: [WORLDFOUNDRY_PHYSICS_IQ_ORIGINAL_ROOT, WORLDFOUNDRY_GENERATED_ARTIFACT_DIR]
integration:
  status: integrated
  notes:
  - Prompt materialization, mask generation, raw video metrics, and original score aggregation execute in tree.
  - Official media are data assets and are not vendored; the upstream source repository is provenance only.
release_status: experimental
maturity: official_runtime_ready
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- Official physics-IQ-benchmark media directory
- 198 generated five-second videos from the bundled prompt suite
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/physics-iq.yaml
  bundled_assets: worldfoundry/data/benchmarks/assets/physics-iq
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysicsIQContract
  runtime_verified: true
  runtime_verification_scope: bounded_complete_three_view_scenario
  full_suite_verified: false
dataset:
  not_applicable: false
  reason: Official reference videos and real masks must be downloaded separately.
validation_command: [worldfoundry-eval, zoo, benchmark-run, --benchmark-id, physics-iq, --mode, official-validation, --official-results-path, <raw_metrics.csv>, --output-dir, <out>, --json]
checkpoint_refs: []
