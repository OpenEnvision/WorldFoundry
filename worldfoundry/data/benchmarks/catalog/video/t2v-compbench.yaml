id: t2v-compbench
name: T2V-CompBench
benchmark_kind:
- text-to-video
- compositionality
- prompt-suite
status: bounded_official_generative_numeracy_verified
open_source_status: in_tree_runtime_bounded_official_component_verified
official_benchmark_verified: false
official_component_verified: true
full_suite_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- A generated-video directory with the persisted T2V-CompBench generation manifest, or an exact official
  category/NNNN.mp4 layout
- A local GroundingDINO checkpoint and a local BERT-compatible text encoder for generative_numeracy execution
- LLaVA-compatible MLLM weights, Depth-Anything, SAM, and DOT/tracking assets for the remaining official categories
blockers:
- Full-suite verification requires all 1,400 generated videos (200 for each of seven categories), not the bounded
  one-video component run.
- The four MLLM categories still require a compatible LLaVA runtime and checkpoint; motion_binding still requires DOT,
  and the other detection paths require their category-specific depth/SAM assets.
- Full official benchmark and leaderboard parity have not been executed.
official_validation:
  verified: true
  scope: bounded_official_generative_numeracy
  category: generative_numeracy
  sample_count: 1
  score: 1.0
  official_component_verified: true
  official_benchmark_verified: false
  full_suite_verified: false
  integration_evidence: true
  leaderboard_valid: false
  scorecard: tmp/eval_chain_smoke/t2v_compbench_numeracy_official/scorecard.json
official_sources:
  github:
    url: https://github.com/KaiyueSun98/T2V-CompBench
    verified_by: GIT_HTTP_VERSION=HTTP/1.1 git ls-remote --symref https://github.com/KaiyueSun98/T2V-CompBench.git HEAD
    default_branch: V2
    head_sha: dd5eff7b93af0550b9efa2bdabbb21b3b017ceda
  project_page: https://t2v-compbench-2025.github.io/
  huggingface_datasets:
  - repo_id: Kaiyue/T2V-CompBench-Videos
    verified_by: GET https://huggingface.co/api/datasets/Kaiyue/T2V-CompBench-Videos
    sha: 92f9ef4642f244567e8aa2789827ec301500a2ff
    private: false
    gated: false
    license: openrail
    task_categories:
    - video-classification
  paper_url: https://arxiv.org/abs/2407.14505
  license: unknown_pending_review
  access_notes: Official GitHub repository is public but GitHub API reports license=null; referenced HF dataset API 
    returned 401 and needs access review.
benchmark_assets:
  prompt_suite:
    status: confirmed_by_project_page
    num_prompts: 1400
    categories: 7
evaluation_surface:
  categories:
  - consistent_attribute_binding
  - dynamic_attribute_binding
  - spatial_relationships
  - motion_binding
  - action_binding
  - object_interactions
  - generative_numeracy
  metric_types:
  - MLLM-based
  - detection-based
  - tracking-based
  requires_api: MLLM-based metrics may require external model/API configuration
  base_model_dependency_ids:
  - depth_anything_v3
  - grounding_dino
  - sam_v1
  - sam2
metrics:
- id: consistent_attribute_binding
  name: Consistent Attribute Binding
  description: T2V-CompBench MLLM score for binding static attributes to the correct objects.
  higher_is_better: true
  leaderboard_key: consistent_attribute_binding
  aggregator: mean
  output_unit: score
- id: dynamic_attribute_binding
  name: Dynamic Attribute Binding
  description: T2V-CompBench MLLM score for temporal attribute changes and bindings.
  higher_is_better: true
  leaderboard_key: dynamic_attribute_binding
  aggregator: mean
  output_unit: score
- id: spatial_relationships
  name: Spatial Relationships
  description: T2V-CompBench detection/depth score for 2D and 3D spatial relationships.
  higher_is_better: true
  leaderboard_key: spatial_relationships
  aggregator: mean
  output_unit: score
- id: motion_binding
  name: Motion Binding
  description: T2V-CompBench tracking score for foreground/background motion binding.
  higher_is_better: true
  leaderboard_key: motion_binding
  aggregator: mean
  output_unit: score
- id: action_binding
  name: Action Binding
  description: T2V-CompBench MLLM score for action-object binding.
  higher_is_better: true
  leaderboard_key: action_binding
  aggregator: mean
  output_unit: score
- id: object_interactions
  name: Object Interactions
  description: T2V-CompBench MLLM score for interaction consistency between objects.
  higher_is_better: true
  leaderboard_key: object_interactions
  aggregator: mean
  output_unit: score
- id: generative_numeracy
  name: Generative Numeracy
  description: T2V-CompBench detection score for generated object counts.
  higher_is_better: true
  leaderboard_key: generative_numeracy
  aggregator: mean
  output_unit: score
- id: t2v_compbench_average
  name: T2V-CompBench Average
  description: Mean emitted only when all seven official T2V-CompBench category scores are available.
  higher_is_better: true
  leaderboard_key: t2v_compbench_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VCompBenchContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - t2v-compbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  run_command:
  - ${WORLDFOUNDRY_UNIFIED_PYTHON}
  - worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/run_t2v_compbench_official_runner.py
  - --generated-video-dir
  - <generated_videos_with_t2v_compbench_generation_manifest.jsonl>
  - --category
  - generative_numeracy
  - --output-dir
  - <out>
  - --json
  required_env:
  - A candidate generated-video root supplied through --generated-video-dir or --video-root
  - GroundingDINO checkpoint/text-encoder assets for generative_numeracy
  expected_artifacts:
  - scorecard.json
  - per_sample_scores.jsonl
  - raw_metric_table.jsonl
  - leaderboard_csv_manifest.json
  - generated_video_manifest.json
  - dataset_manifest.json
  - upstream_stdout.log
  - upstream_stderr.log
  verification_status: bounded_official_generative_numeracy_verified
  notes:
  - The strict model-artifact manifest bridge and the in-tree official generative_numeracy evaluator were executed on
    one real MP4; the resulting scorecard records official_component_verified=true and integration_evidence=true.
  - The runner can also normalize official CSV outputs and execute other categories when their metric assets are
    prepared.
  - Full benchmark and leaderboard validation still require 1,400 videos plus compatible LLaVA, depth/SAM, and DOT
    runtimes.
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
    root_env: WORLDFOUNDRY_T2V_COMPBENCH_ROOT
    results_path_env: WORLDFOUNDRY_T2V_COMPBENCH_RESULTS_PATH
integration:
  status: integrated
  blocked_reasons:
  - Full-suite execution requires separate compatible MLLM, detection/depth, and tracking metric assets.
  - The bounded generative_numeracy execution does not establish full-suite or leaderboard parity.
release_status: experimental
maturity: bounded_official_component_verified
data_refs:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/Kaiyue/T2V-CompBench-Videos
  - cache/worldfoundry/data/hfd_datasets/Kaiyue__T2V-CompBench-Videos
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/t2v-compbench.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VCompBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: strict_video_manifest_bridge_and_bounded_official_generative_numeracy
  normalizer_verified: true
base_model_dependencies:
- grounded_depth_segmentation_stack
base_model_dependency_preflight:
  status: ready
  python: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
  verified_at: '2026-05-25T07:21:22+00:00'
  in_tree_capabilities:
  - grounding_dino
  ready_env:
    WORLDFOUNDRY_GROUNDING_DINO_CKPT: ${WORLDFOUNDRY_T2V_COMPBENCH_GROUNDINGDINO_CKPT}
  runtime_env:
    WORLDFOUNDRY_T2V_COMPBENCH_ROOT: worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
  profile_blockers:
  - Full suite requires 1,400 generated videos and the LLaVA, depth/SAM, and DOT evaluator assets.
  missing: []
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- t2v-compbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
