        warmup: 0.0
        weight_decay: 0.1
        final_weight_decay: 0.1
      - lr: 0.001
        start_lr: 0.001
        final_lr: 0.0
        warmup: 0.0
        weight_decay: 0.4
        final_weight_decay: 0.4
      - lr: 0.0003
        start_lr: 0.0003
        final_lr: 0.0
        warmup: 0.0
        weight_decay: 0.8
        final_weight_decay: 0.8
      - lr: 0.0001
