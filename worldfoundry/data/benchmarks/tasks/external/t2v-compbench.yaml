benchmark: t2v-compbench
description: T2V-CompBench external benchmark task manifest for compositional text-to-video evaluation.
id: t2v-compbench
name: T2V-CompBench
status: bounded_official_generative_numeracy_verified
tags:
- benchmark-zoo
- external-official
- t2v-compbench
- compositionality
splits:
- standard
metrics:
  consistent_attribute_binding:
    aggregation: mean
  dynamic_attribute_binding:
    aggregation: mean
  spatial_relationships:
    aggregation: mean
  motion_binding:
    aggregation: mean
  action_binding:
    aggregation: mean
  object_interactions:
    aggregation: mean
  generative_numeracy:
    aggregation: mean
  t2v_compbench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: t2v-compbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id t2v-compbench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/t2v-compbench --json
  open_source_status: in_tree_runtime_bounded_official_component_verified
  official_benchmark_verified: false
  official_component_verified: true
  full_suite_verified: false
  integration_evidence: true
  leaderboard_valid: false
  requires:
  - A generated-video directory with the persisted T2V-CompBench generation manifest, or an exact official
    category/NNNN.mp4 layout
  - A local GroundingDINO checkpoint and a local BERT-compatible text encoder for generative_numeracy execution
  - LLaVA-compatible MLLM weights, Depth-Anything, SAM, and DOT/tracking assets for the remaining categories
  blockers:
  - Full-suite verification requires all 1,400 generated videos, with 200 videos for each of seven categories.
  - The four MLLM categories still require a compatible LLaVA runtime/checkpoint; motion_binding requires DOT; the
    remaining detection paths require their category-specific depth/SAM assets.
  - Full official benchmark and leaderboard parity have not been executed.
  official_validation:
    verified: true
    scope: bounded_official_generative_numeracy
    category: generative_numeracy
    sample_count: 1
    score: 1.0
    official_component_verified: true
    official_benchmark_verified: false
    full_suite_verified: false
    integration_evidence: true
    leaderboard_valid: false
    scorecard: tmp/eval_chain_smoke/t2v_compbench_numeracy_official/scorecard.json
  base_model_dependencies:
  - grounded_depth_segmentation_stack
  base_model_dependency_preflight:
    status: ready
    python: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
    verified_at: '2026-05-25T07:21:22+00:00'
    in_tree_capabilities:
    - grounding_dino
    ready_env:
      WORLDFOUNDRY_GROUNDING_DINO_CKPT: ${WORLDFOUNDRY_T2V_COMPBENCH_GROUNDINGDINO_CKPT}
    runtime_env:
      WORLDFOUNDRY_T2V_COMPBENCH_ROOT: 
        worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
    profile_blockers:
    - Full suite requires 1,400 generated videos and the LLaVA, depth/SAM, and DOT evaluator assets.
    missing: []
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VCompBenchContract
  official_runner_script: 
    worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/run_t2v_compbench_official_runner.py
  prompt_suite:
    mode: t2v_compbench_v2
    hf_dataset_id: Kaiyue/T2V-CompBench-Videos
    hf_config: default
    hf_split: train
    expected_rows: 25200
    root_env: WORLDFOUNDRY_T2V_COMPBENCH_ROOT
    categories: 7
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/KaiyueSun98/T2V-CompBench.git
    revision: dd5eff7b93af0550b9efa2bdabbb21b3b017ceda
    root: worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
    root_env: WORLDFOUNDRY_T2V_COMPBENCH_ROOT
    results_path_env: WORLDFOUNDRY_T2V_COMPBENCH_RESULTS_PATH
  release_status: experimental
  maturity: bounded_official_component_verified
  data_refs:
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/Kaiyue/T2V-CompBench-Videos
    - cache/worldfoundry/data/hfd_datasets/Kaiyue__T2V-CompBench-Videos
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
    task_yaml: worldfoundry/data/benchmarks/tasks/external/t2v-compbench.yaml
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VCompBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: strict_video_manifest_bridge_and_bounded_official_generative_numeracy
    normalizer_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/run_t2v_compbench_official_runner.py
    status: implemented
    protocol: in_tree_official_runtime_and_result_normalization
    official_execution:
      status: bounded_official_component_verified
      category: generative_numeracy
      sample_count: 1
      scorecard: tmp/eval_chain_smoke/t2v_compbench_numeracy_official/scorecard.json
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_T2V_COMPBENCH_RESULTS_PATH
      formats:
      - json
      - csv
      provenance: normalizes caller-provided official outputs; category execution uses the in-tree official runtime
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - t2v-compbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  checkpoint_refs: []
tasks:
  t2v_compbench_video_standard:
    benchmark_name: t2v-compbench
    protocol: external_official_benchmark
    capability_track: compositional_video_generation
    input_keys:
    - prompt
    - prompt_id
    - category
    output_keys:
    - generated_video
    metric_ids:
    - consistent_attribute_binding
    - dynamic_attribute_binding
    - spatial_relationships
    - motion_binding
    - action_binding
    - object_interactions
    - generative_numeracy
    - t2v_compbench_average
    metric_groups:
    - t2v_compbench_categories
    tags:
    - benchmark-zoo
    - t2v-compbench
    - t2v
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: t2v-compbench
      open_source_status: in_tree_runtime_bounded_official_component_verified
      official_benchmark_verified: false
      official_component_verified: true
      full_suite_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: Kaiyue/T2V-CompBench-Videos
      config: default
      split: train
      expected_rows: 25200
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/runtime/t2v_compbench
      optional_root_env: WORLDFOUNDRY_T2V_COMPBENCH_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      dataset_root_env: WORLDFOUNDRY_T2V_COMPBENCH_DATASET_ROOT
      video_root_env: WORLDFOUNDRY_T2V_COMPBENCH_VIDEO_ROOT
      results_path_env: WORLDFOUNDRY_T2V_COMPBENCH_CSV_DIR
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - consistent_attribute_binding
      - dynamic_attribute_binding
      - spatial_relationships
      - motion_binding
      - action_binding
      - object_interactions
      - generative_numeracy
      - t2v_compbench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VCompBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/run_t2v_compbench_official_runner.py
      official_validation_command: ${WORLDFOUNDRY_UNIFIED_PYTHON} 
        worldfoundry/evaluation/tasks/execution/runners/t2v_compbench/run_t2v_compbench_official_runner.py
        --generated-video-dir <generated_videos_with_t2v_compbench_generation_manifest.jsonl> --category
        generative_numeracy --output-dir <out> --json
