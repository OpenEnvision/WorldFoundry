- Full evaluation needs all seven categories and 200 generated videos per category. The MLLM and DOT/tracking paths
  still need their compatible runtime/checkpoint assets.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
