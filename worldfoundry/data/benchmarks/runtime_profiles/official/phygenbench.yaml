benchmark_ids:
- phygenbench
blocked_reason: Only official-result import and the bounded PhyGenEval overall.py aggregation component are available;
  stage judge execution is not provided.
environment_id: worldfoundry-unified-cu128
id: phygenbench
name: PhyGenBench
needs_new_env: false
notes:
- Source metadata, prompts, and the bounded PhyGenEval overall.py aggregator are in-tree; WORLDFOUNDRY_PHYGENBENCH_ROOT is only an override.
- Result import is available through worldfoundry-eval zoo benchmark-run --mode official-validation
  --official-results-path.
- overall.py requires already-prepared stage outputs and is not full benchmark execution.
- The mock backend is wiring-only and is never benchmark evidence.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile phygenbench --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/phygenbench.yaml --output-dir
  tmp/worldfoundry_preflight/phygenbench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  bounded_component_paths:
  - worldfoundry/data/benchmarks/assets/phygenbench/PhyGenBench/prompts.json
  - worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench/PhyGenEval/overall.py
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phygenbench.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/phygenbench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench/PhyGenEval/overall.py
requires_cuda_visibility: false
status: result_importer_and_bounded_overall_aggregator_ready_stage_judges_pending
optional_imports:
- numpy
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phygenbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
