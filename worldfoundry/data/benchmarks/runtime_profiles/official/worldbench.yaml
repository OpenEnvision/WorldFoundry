benchmark_ids: [worldbench]
id: worldbench
name: WorldBench
environment_id: worldfoundry-unified-cu128
needs_new_env: false
readiness_note: The in-tree evaluator and compatibility normalizer use the unified environment; raw video scoring additionally needs the dataset and SAM2.1 Hiera Large weights.

notes:
- The runtime contains only evaluation/inference code and reuses worldfoundry.base_models.perception_core.segment.sam2.
- No extra WorldBench or SAM2 source checkout is needed at runtime.
- Existing JSON/JSONL/CSV/TSV result normalization remains supported without CUDA or SAM2 weights.
- Leaderboard parity remains false pending a full-dataset numerical audit.

python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots: [.]
preflight_command: >-
  PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight
  --profile worldbench
  --manifest worldfoundry/data/benchmarks/runtime_profiles/official/worldbench.yaml
  --output-dir tmp/worldfoundry_preflight/worldbench
  --json

required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
  - worldfoundry/evaluation/tasks/execution/runners/worldbench/runtime/worldbench
  evaluator_config: worldfoundry/data/benchmarks/assets/worldbench/evaluator.yaml
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldbench.yaml

leaderboard_parity_required_assets:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/worldbenchmark/IntuitivePhysics
  - cache/worldfoundry/data/hfd_datasets/worldbenchmark__IntuitivePhysics
  sam2_checkpoint: ${WORLDFOUNDRY_HFD_ROOT}/facebook--sam2.1-hiera-large/sam2.1_hiera_large.pt

required_env: []
optional_env:
- WORLDFOUNDRY_WORLDBENCH_DATASET_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WORLDBENCH_VIDEO_MANIFEST
- WORLDFOUNDRY_WORLDBENCH_ANSWER_MANIFEST
- WORLDFOUNDRY_WORLDBENCH_SAM2_CKPT
- WORLDFOUNDRY_WORLDBENCH_SAM2_MODEL_ID
- WORLDFOUNDRY_WORLDBENCH_PREDICTED_MASK_DIR
- WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH
- WORLDFOUNDRY_WORLDBENCH_ARTIFACT_SCORE_DIR

required_imports:
- numpy
- PIL
- yaml
- torch
- hydra
- omegaconf
- iopath
- decord
required_packages:
- numpy
- Pillow
- PyYAML
- torch
- hydra-core
- omegaconf
- iopath
- decord
- opencv-python
- huggingface-hub

required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/worldbench/runtime/worldbench
- id: evaluator_config
  path: worldfoundry/data/benchmarks/assets/worldbench/evaluator.yaml
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/worldbench.yaml
optional_paths:
- id: local_dataset_1
  path: cache/worldfoundry/data/hfd_datasets/worldbenchmark/IntuitivePhysics
- id: local_dataset_2
  path: cache/worldfoundry/data/hfd_datasets/worldbenchmark__IntuitivePhysics
- id: sam2_hiera_large_checkpoint
  env: WORLDFOUNDRY_WORLDBENCH_SAM2_CKPT
  path: ${WORLDFOUNDRY_HFD_ROOT}/facebook--sam2.1-hiera-large/sam2.1_hiera_large.pt

requires_cuda_visibility: false
status: in_tree_runtime_ready
base_model_dependency_preflight:
  status: integrated
  shared_implementation: worldfoundry.base_models.perception_core.segment.sam2
  model_id: facebook/sam2.1-hiera-large
base_model_dependencies:
- worldbench_dataset_assets
- sam2
optional_base_model_dependencies:
- video_world_perception_stack

bounded_fixture_validation:
  status: verified
  components: [foreground_miou, foreground_dice, background_rmse, text_based_accuracy]
  uses_precomputed_masks: true
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  runtime_env: conda/envs/worldfoundry-unified-cu128

validation_command:
- ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
- -m
- worldfoundry.evaluation.tasks.execution.runners.worldbench.run_worldbench_official_runner
- --run-official
- --dataset-root
- ${WORLDFOUNDRY_WORLDBENCH_DATASET_ROOT}
- --generated-video-dir
- ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
- --output-dir
- <out>
- --json
