benchmark_ids:
- phyeduvideo
blocked_reason: PhyEduVideo result import is wired; the raw-video upstream judge/checkpoint
  runtime and leaderboard parity remain pending.
environment_id: worldfoundry-unified-cu128
id: phyeduvideo
name: PhyEduVideo
needs_new_env: false
notes:
- WorldFoundry materializes Prompts/Prompts.json teaching-point T2V prompts and normalizes PhyEduVideo official result 
  files.
- This profile does not execute raw-video InternVL/CLIP/VQA judging; imported results are not official benchmark evidence.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile phyeduvideo --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/phyeduvideo.yaml --output-dir 
  tmp/worldfoundry_preflight/phyeduvideo --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  bundled_assets: worldfoundry/data/benchmarks/assets/phyeduvideo
  result_importer_paths:
  - worldfoundry/evaluation/tasks/execution/runners/phyeduvideo
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phyeduvideo.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_PHYEDUVIDEO_ROOT
- WORLDFOUNDRY_PHYEDUVIDEO_PROMPTS_FILE
- WORLDFOUNDRY_PHYEDUVIDEO_CAP_FILE
- WORLDFOUNDRY_PHYEDUVIDEO_SA_FILE
- WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
- WORLDFOUNDRY_PHYEDUVIDEO_STRICT
required_imports:
- json
required_packages:
- numpy
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py
required_paths:
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/phyeduvideo.yaml
- id: bundled_prompts
  path: worldfoundry/data/benchmarks/assets/phyeduvideo/Prompts/Prompts.json
requires_cuda_visibility: false
status: in_tree_result_importer_ready_raw_video_judge_pending
optional_imports:
- numpy
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phyeduvideo
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
