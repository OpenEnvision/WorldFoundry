id: evalcrafter
name: EvalCrafter
benchmark_ids:
- evalcrafter
status: bounded_official_clip_metrics_verified
environment_id: worldfoundry-unified-cu128
needs_new_env: false
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
requires_cuda_visibility: true
blocked_reason: The three official CLIP metrics are runnable from generated videos; the complete 17-metric benchmark and
  leaderboard aggregate still require the isolated full-metrics environment and additional checkpoints.
notes:
- The public official-run path executes clip_score, clip_temp_score, and face_consistency_score directly from videos.
- A real one-video smoke run completed for all three metrics. This is bounded integration evidence, not a full-suite or
  leaderboard result.
- Result import remains available for an existing official final_result.txt.
- The heavyweight TensorFlow/PaddleOCR/MMAction/DOVER stack is intentionally kept in the separate
  worldfoundry-evalcrafter-metrics environment described by the benchmark environment manifest.
base_model_dependencies:
- clip_vit_b32
base_model_dependency_preflight:
  status: integrated
  notes:
  - CLIP ViT-B/32 is resolved through the shared base-model asset location or an explicit model path.
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/evalcrafter/run_evalcrafter_official_runner.py
  - worldfoundry/evaluation/tasks/execution/runners/evalcrafter/evalcrafter_raw_metrics.py
  local_dataset_paths:
  - EvalCrafter_T2V_Dataset
  task_yaml: worldfoundry/data/benchmarks/tasks/external/evalcrafter.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_EVALCRAFTER_CLIP_MODEL
- WORLDFOUNDRY_CLIP_VIT_B32_MODEL_DIR
- WORLDFOUNDRY_EVALCRAFTER_RESULTS_PATH
required_imports:
- numpy
- cv2
- torch
- torchvision
- transformers
required_packages:
- numpy
- opencv-python
- torch
- torchvision
- transformers
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/evalcrafter/run_evalcrafter_official_runner.py
- id: raw_metric_adapter
  path: worldfoundry/evaluation/tasks/execution/runners/evalcrafter/evalcrafter_raw_metrics.py
- id: evalcrafter_prompt_suite
  path: worldfoundry/data/benchmarks/assets/evalcrafter/prompt700.txt
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/evalcrafter.yaml
preflight_command: >-
  PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile evalcrafter --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/evalcrafter.yaml --output-dir
  tmp/worldfoundry_preflight/evalcrafter --json
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- evalcrafter
- --mode
- official-run
- --generated-artifact-dir
- <directory-with-numbered-mp4-files>
- --metrics
- clip_score
- --limit
- '1'
- --output-dir
- <out>
- --json
