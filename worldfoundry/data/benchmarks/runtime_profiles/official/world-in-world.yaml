benchmark_ids:
- world-in-world
blocked_reason: WorldFoundry imports World-in-World task summaries; closed-loop rollout, environment, planner, and task
  scorer execution are not provided by this profile.
environment_id: worldfoundry-unified-cu128
id: world-in-world
name: World-in-World
needs_new_env: false
notes:
- WorldFoundry normalizes caller-provided World-in-World task summaries.
- This result importer does not launch closed-loop environments, model workers, planners, or task scorers.
- Imported summaries are not official benchmark or leaderboard evidence.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile world-in-world --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/world-in-world.yaml --output-dir
  tmp/worldfoundry_preflight/world-in-world --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  bundled_prompt_assets: worldfoundry/data/benchmarks/assets/world-in-world
  result_importer: worldfoundry/evaluation/tasks/execution/runners/world_in_world
  task_yaml: worldfoundry/data/benchmarks/tasks/external/world-in-world.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WORLD_IN_WORLD_RESULTS_PATH
- WORLDFOUNDRY_WORLD_IN_WORLD_ASSETS_ROOT
- WORLDFOUNDRY_WORLD_IN_WORLD_PROMPT_MANIFEST
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/world_in_world/run_world_in_world_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/world-in-world.yaml
- id: runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/world_in_world
- id: bundled_prompt_assets
  path: worldfoundry/data/benchmarks/assets/world-in-world
requires_cuda_visibility: false
status: in_tree_result_normalizer_ready_closed_loop_runtime_pending
optional_imports:
- numpy
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- world-in-world
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
