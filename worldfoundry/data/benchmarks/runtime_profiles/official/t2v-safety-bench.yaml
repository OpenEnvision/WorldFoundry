benchmark_ids:
- t2v-safety-bench
blocked_reason: Real T2VSafetyBench judge execution requires generated artifacts and user-supplied API/model access;
  it has not been claimed as release-verified leaderboard evidence.
environment_id: worldfoundry-unified-cu128
id: t2v-safety-bench
name: T2VSafetyBench
needs_new_env: false
notes:
- WorldFoundry ships the T2VSafetyBench prompt-to-video adapter and GPT judge runtime in tree.
- Real scoring requires generated videos for the selected prompt class and a user-supplied OpenAI-compatible judge.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.runners.t2v_safety_bench.run_t2v_safety_bench_official_runner --help
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/t2v-safety-bench.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_T2V_SAFETY_BENCH_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
- WORLDFOUNDRY_T2V_SAFETY_BENCH_GPT_API_KEY
- OPENAI_API_KEY
required_imports:
- cv2
- openai
- openpyxl
- pandas
required_packages:
- openai>=1
- openpyxl
- opencv-python
- pandas
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/run_t2v_safety_bench_official_runner.py
required_paths:
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/t2v-safety-bench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_api_key_required
optional_imports:
- numpy
optional_base_model_dependencies:
- video_quality_motion_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- t2v-safety-bench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
